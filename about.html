<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>关于 | nEwBeE303</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf9f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: #2c3e4e;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            padding: 2.5rem 2rem;
        }

        /* 头部导航 */
        .site-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #eaeef2;
        }

        .blog-title {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a4d6b;
            margin-bottom: 0.3rem;
        }

        .tagline {
            color: #6b8ba5;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 0.8rem;
        }

        .nav a {
            text-decoration: none;
            font-size: 0.9rem;
            color: #4a708b;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: #1a4d6b;
            text-decoration: underline;
        }

        /* 关于页面主体 */
        .about-section {
            text-align: center;
            padding: 2rem 1rem;
        }

        .about-title {
            font-size: 2rem;
            font-weight: 600;
            color: #1a3a4a;
            margin-bottom: 1.5rem;
        }

        .about-content {
            color: #5a7e9a;
            font-size: 1.05rem;
            background: #f8fafc;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #eef2f6;
        }

        .about-content p {
            margin: 0;
        }

        hr {
            margin: 2rem 0;
            border: none;
            border-top: 1px solid #eef2f6;
        }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            color: #8aa2b8;
            margin-top: 1rem;
            padding-top: 1rem;
        }

        @media (max-width: 560px) {
            .container {
                padding: 1.5rem;
            }
            .blog-title {
                font-size: 1.8rem;
            }
            .about-title {
                font-size: 1.6rem;
            }
            .nav {
                gap: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="site-header">
        <h1 class="blog-title">nEwBeE303</h1>
        <div class="tagline">记录学习，分享思考</div>
        <div class="nav">
            <a href="#">home</a>
            <a href="#" style="font-weight: 500; color: #1a4d6b;">about</a>
            <a href="#">archive</a>
        </div>
    </header>

    <main>
        <div class="about-section">
            <h2 class="about-title">关于</h2>
            <div class="about-content">
                <p>这个人很懒，什么也没有留下。</p>
            </div>
        </div>
    </main>

    <hr>

    <footer class="footer">
        © 2024 nEwBeE303 | GitHub
    </footer>
</div>
</body>
</html>
